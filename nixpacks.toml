[phases.setup]
nixPkgs = ["php", "phpPackages.composer"]

[phases.install]
cmds = ["composer install"]

[phases.build]
cmds = [
  "php artisan key:generate",
  "php artisan config:cache",
  "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT""php -S 0.0.0.0:$PORT -t public"
